---
# Deploy test infrastructure on each node

- name: Create results directory
  file:
    path: /opt/test_results
    state: directory
    mode: '0777'

- name: Copy test matrix config to node
  copy:
    src: "{{ playbook_dir }}/../../docker/test_matrix.json"
    dest: /opt/test_matrix.json
    mode: '0644'

- name: Verify CUDA stub is present
  stat:
    path: /usr/local/cuda/version.txt
  register: cuda_version_file

- name: Show CUDA version
  command: cat /usr/local/cuda/version.txt
  when: cuda_version_file.stat.exists
  register: cuda_version_output

- name: Print CUDA version
  debug:
    msg: "CUDA stub on {{ inventory_hostname }}: {{ cuda_version_output.stdout }}"
  when: cuda_version_file.stat.exists
